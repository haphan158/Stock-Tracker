version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      # Patches and minors are safe to merge together once CI is green —
      # they should not introduce breaking changes.
      safe-updates:
        applies-to: version-updates
        update-types:
          - patch
          - minor
      # Majors open one PR per package so you can review release notes and
      # handle migrations individually.
      major-updates:
        applies-to: version-updates
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      actions-all:
        applies-to: version-updates
        patterns:
          - '*'
