name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stock_tracker_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Stub values that satisfy the zod env schema. No real secrets are
      # needed because CI doesn't exercise external APIs or OAuth flows.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stock_tracker_ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-placeholder-secret-at-least-32-characters-long
      GOOGLE_CLIENT_ID: ci-placeholder-client-id
      GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
      NODE_ENV: test
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          # Built-in npm cache keyed off package-lock.json — avoids the
          # separate actions/cache step and is faster on warm runs.
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
